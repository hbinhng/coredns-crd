# Default values for coredns-crd. Override with --set or -f.

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: ghcr.io/hbinhng/coredns-crd
  # tag defaults to .Chart.AppVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Annotations applied to pod template (e.g., for Linkerd/Istio injection
# control or scrape configuration).
podAnnotations: {}

# Annotations applied to the ServiceAccount (e.g., for IAM Roles for Service
# Accounts on EKS or Workload Identity on GKE).
serviceAccountAnnotations: {}

resources:
  requests:
    cpu: 100m
    memory: 70Mi
  limits:
    memory: 200Mi

service:
  type: ClusterIP
  # When replacing kube-dns, set clusterIP explicitly so kubelet's
  # --cluster-dns flag points at us. e.g. 10.96.0.10 (kubeadm) or
  # 10.43.0.10 (k3s). Empty = let the API server allocate.
  clusterIP: ""
  ports:
    dns: 53
    dnsTcp: 53
    metrics: 9153
  annotations:
    prometheus.io/port: "9153"
    prometheus.io/scrape: "true"

leaderElection:
  enabled: true
  # namespace defaults to release namespace via downward API
  namespace: ""
  leaseName: coredns-crd-leader

corefile:
  zones: [".:53"]
  errors: true
  health:
    enabled: true
    lameduck: 5s
  ready: true
  crd:
    fallthrough: true
  kubernetes:
    enabled: true
    cluster: cluster.local
    pods: insecure
    fallthroughZones: ["in-addr.arpa", "ip6.arpa"]
    ttl: 30
  prometheus:
    listen: ":9153"
  forward:
    upstream: /etc/resolv.conf
    maxConcurrent: 1000
  cache:
    ttl: 30
  loop: true
  reload: true
  loadbalance: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

networkPolicy:
  # NetworkPolicy is enforced only by CNIs that implement it (Calico,
  # Cilium, k3s with the network-policy controller). Vanilla flannel
  # does NOT enforce. Opt in deliberately.
  enabled: false
  # Ingress sources allowed to scrape the metrics port. Empty list/null
  # = no metrics ingress (Prometheus would be blocked). Default targets
  # the kube-prometheus-stack convention: prometheus pods in `monitoring`.
  metricsAllowedFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

nodeSelector:
  kubernetes.io/os: linux

priorityClassName: system-cluster-critical
