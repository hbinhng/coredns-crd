# Default values for coredns-crd. Override with --set or -f.

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: ghcr.io/hbinhng/coredns-crd
  # tag defaults to .Chart.AppVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Annotations applied to pod template (e.g., for Linkerd/Istio injection
# control or scrape configuration).
podAnnotations: {}

# Annotations applied to the ServiceAccount (e.g., for IAM Roles for Service
# Accounts on EKS or Workload Identity on GKE).
serviceAccountAnnotations: {}

resources:
  requests:
    cpu: 100m
    memory: 70Mi
  limits:
    memory: 200Mi

service:
  type: ClusterIP
  # When replacing kube-dns, set clusterIP explicitly so kubelet's
  # --cluster-dns flag points at us. e.g. 10.96.0.10 (kubeadm) or
  # 10.43.0.10 (k3s). Empty = let the API server allocate.
  clusterIP: ""
  ports:
    dns: 53
    dnsTcp: 53
    metrics: 9153
  annotations:
    prometheus.io/port: "9153"
    prometheus.io/scrape: "true"
  loadBalancer:
    # Render a second Service of type LoadBalancer pointing at the same
    # Deployment. Useful for exposing DNS to clients outside the cluster.
    # The metrics port is intentionally excluded from the LB Service.
    enabled: false
    # `Local` preserves the client source IP; `Cluster` SNATs through any
    # node. DNS access policies and audit logging want `Local`.
    externalTrafficPolicy: Local
    # Optional. Useful for MetalLB / kube-vip / Cilium L2 announcement.
    loadBalancerClass: ""
    # Optional. Most cloud providers ignore this; useful for bare-metal
    # LB controllers that honor it.
    loadBalancerIP: ""
    # Optional. Common values:
    #   networking.gke.io/load-balancer-type: Internal
    #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    #   metallb.io/loadBalancerIPs: "192.168.1.53"
    annotations: {}

leaderElection:
  enabled: true
  # namespace defaults to release namespace via downward API
  namespace: ""
  leaseName: coredns-crd-leader

corefile:
  zones: [".:53"]
  errors: true
  health:
    enabled: true
    lameduck: 5s
  ready: true
  crd:
    fallthrough: true
  kubernetes:
    enabled: true
    cluster: cluster.local
    pods: insecure
    fallthroughZones: ["in-addr.arpa", "ip6.arpa"]
    ttl: 30
  prometheus:
    listen: ":9153"
  forward:
    # Either set `upstreams` (list, preferred) OR `upstream` (string, legacy).
    # If `upstreams` is empty AND `upstream` is empty/null, the forward block
    # is omitted from the Corefile (authoritative-only behavior).
    upstreams: []
    upstream: /etc/resolv.conf  # legacy single-string form, kept for back-compat
    maxConcurrent: 1000
    # Public-LB recursion guard: must be true to combine upstreams with
    # service.loadBalancer.enabled. See README "Deployment modes."
    allowPublicRecursion: false
  cache:
    ttl: 30
  loop: true
  reload: true
  loadbalance: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

networkPolicy:
  # NetworkPolicy is enforced only by CNIs that implement it (Calico,
  # Cilium, k3s with the network-policy controller). Vanilla flannel
  # does NOT enforce. Opt in deliberately.
  enabled: false
  # Ingress sources allowed to scrape the metrics port. Empty list/null
  # = no metrics ingress (Prometheus would be blocked). Default targets
  # the kube-prometheus-stack convention: prometheus pods in `monitoring`.
  metricsAllowedFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus

tolerations:
  - key: CriticalAddonsOnly
    operator: Exists
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

nodeSelector:
  kubernetes.io/os: linux

hostNetwork:
  # Run pods in the node's network namespace. Each node IP becomes a
  # DNS server on :53. Useful for homelab / bare-metal / "router uses
  # these IPs as upstream DNS." Requires that no other process on the
  # node binds :53. NetworkPolicy does not apply to hostNetwork pods.
  enabled: false
  # When hostNetwork is enabled, dnsPolicy must be set explicitly so the
  # pod's own DNS resolution still works. ClusterFirstWithHostNet keeps
  # cluster.local resolvable from inside the pod.
  dnsPolicy: ClusterFirstWithHostNet

priorityClassName: system-cluster-critical
