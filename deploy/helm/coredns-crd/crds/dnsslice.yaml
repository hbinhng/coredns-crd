apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnsslices.dns.coredns-crd.io
spec:
  group: dns.coredns-crd.io
  scope: Namespaced
  names:
    plural: dnsslices
    singular: dnsslice
    kind: DNSSlice
    shortNames: [dnss]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: Conflicting
          type: string
          jsonPath: .status.conditions[?(@.type=='Conflicting')].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion: {type: string}
            kind: {type: string}
            metadata: {type: object}
            spec:
              type: object
              required: [entries]
              properties:
                defaultTTL:
                  type: integer
                  format: int32
                  minimum: 0
                  maximum: 2147483647
                  default: 300
                entries:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: object
                    required: [name, type]
                    properties:
                      name:
                        type: string
                        maxLength: 253
                        pattern: '^([a-zA-Z0-9_]([-a-zA-Z0-9_]{0,61}[a-zA-Z0-9_])?\.)+$'
                      type:
                        type: string
                        enum: [A, AAAA, CNAME, TXT, SRV]
                      ttl:
                        type: integer
                        format: int32
                        minimum: 0
                        maximum: 2147483647
                      a:
                        type: object
                        required: [address]
                        properties:
                          address:
                            type: string
                            pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}$'
                      aaaa:
                        type: object
                        required: [address]
                        properties:
                          address:
                            type: string
                            minLength: 2
                            maxLength: 45
                      cname:
                        type: object
                        required: [target]
                        properties:
                          target:
                            type: string
                            maxLength: 253
                            pattern: '^([a-zA-Z0-9_]([-a-zA-Z0-9_]{0,61}[a-zA-Z0-9_])?\.)+$'
                      txt:
                        type: object
                        required: [values]
                        properties:
                          values:
                            type: array
                            minItems: 1
                            items: {type: string}
                      srv:
                        type: object
                        required: [priority, weight, port, target]
                        properties:
                          priority: {type: integer, format: int32, minimum: 0, maximum: 65535}
                          weight:   {type: integer, format: int32, minimum: 0, maximum: 65535}
                          port:     {type: integer, format: int32, minimum: 1, maximum: 65535}
                          target:
                            type: string
                            maxLength: 253
                            pattern: '^([a-zA-Z0-9_]([-a-zA-Z0-9_]{0,61}[a-zA-Z0-9_])?\.)+$'
                      raw:
                        type: object
                        required: [rdata]
                        properties:
                          rdata:
                            type: string
                            minLength: 1
                    x-kubernetes-validations:
                      - rule: "(has(self.a) ? 1 : 0) + (has(self.aaaa) ? 1 : 0) + (has(self.cname) ? 1 : 0) + (has(self.txt) ? 1 : 0) + (has(self.srv) ? 1 : 0) + (has(self.raw) ? 1 : 0) == 1"
                        message: "exactly one rdata block must be set"
                      - rule: "self.type != 'A' || has(self.a)"
                        message: "entries with type=A must set .a"
                      - rule: "self.type != 'AAAA' || has(self.aaaa)"
                        message: "entries with type=AAAA must set .aaaa"
                      - rule: "self.type != 'CNAME' || has(self.cname)"
                        message: "entries with type=CNAME must set .cname"
                      - rule: "self.type != 'TXT' || has(self.txt)"
                        message: "entries with type=TXT must set .txt"
                      - rule: "self.type != 'SRV' || has(self.srv)"
                        message: "entries with type=SRV must set .srv"
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: {type: string, maxLength: 316}
                      status: {type: string, enum: ["True", "False", "Unknown"]}
                      observedGeneration: {type: integer, format: int64}
                      lastTransitionTime: {type: string, format: date-time}
                      reason: {type: string, maxLength: 1024}
                      message: {type: string, maxLength: 32768}
                conflictedEntries:
                  type: array
                  items: {type: string}
