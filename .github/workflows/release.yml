name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go test -race -count=2 ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Release creation
      packages: write   # ghcr.io push
      id-token: write   # cosign keyless OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.title=coredns-crd

      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Bump Chart.yaml + package + push
        run: |
          set -euo pipefail
          tag=${GITHUB_REF_NAME#v}
          sed -i "s/^version: .*/version: ${tag}/" deploy/helm/coredns-crd/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${GITHUB_REF_NAME}\"/" deploy/helm/coredns-crd/Chart.yaml
          helm package deploy/helm/coredns-crd
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} --password-stdin
          helm push "coredns-crd-${tag}.tgz" "oci://ghcr.io/${{ github.repository }}/charts"

      - name: Sign chart
        run: |
          set -euo pipefail
          tag=${GITHUB_REF_NAME#v}
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}/charts/coredns-crd:${tag}"

      - name: Resolve chart tarball name
        id: chart
        run: |
          tag=${GITHUB_REF_NAME#v}
          echo "tarball=coredns-crd-${tag}.tgz" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.chart.outputs.tarball }}
