name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go vet ./...
      - run: go test -race -count=2 ./...
      - name: Coverage gate (must stay 100% on protected packages)
        run: |
          set -euo pipefail
          for pkg in \
            ./internal/index/... \
            ./internal/leader/... \
            ./internal/events/...; do
            cov=$(go test -cover "$pkg" 2>&1 | tail -1 \
              | grep -oE 'coverage: [0-9]+\.[0-9]+' | awk '{print $2}')
            echo "$pkg: ${cov}%"
            awk -v c="${cov:-0}" 'BEGIN { if (c+0 < 100.0) exit 1 }'
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin kubeconform
      - run: helm lint deploy/helm/coredns-crd
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.6.2
      - name: Run helm-unittest
        run: helm unittest deploy/helm/coredns-crd
      - name: Render + kubeconform
        run: |
          helm template coredns-crd deploy/helm/coredns-crd \
            --namespace kube-system \
            --set service.clusterIP=10.96.0.10 \
            > /tmp/rendered.yaml
          kubeconform -strict -summary /tmp/rendered.yaml

  build-main-image:
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=coredns-crd
