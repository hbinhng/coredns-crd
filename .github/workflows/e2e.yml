name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: docker/setup-buildx-action@v3
      - uses: helm/kind-action@v1
        with:
          version: v0.24.0
          cluster_name: coredns-crd-e2e
      - name: Build + load image
        run: |
          docker build -t coredns-crd:e2e .
          kind load docker-image coredns-crd:e2e --name coredns-crd-e2e
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - name: Run e2e
        run: |
          set -o pipefail
          bash test/e2e/run.sh 2>&1 | tee /tmp/e2e.log
      - name: Diagnostics on failure
        if: failure()
        run: |
          {
            echo '## e2e run.sh output (tail)'
            echo '```'
            tail -200 /tmp/e2e.log 2>/dev/null || echo '(no log captured)'
            echo '```'
            echo '## kubectl get pods -A'
            echo '```'
            kubectl get pods -A -o wide 2>&1 || true
            echo '```'
            echo '## kube-dns pods (describe)'
            echo '```'
            kubectl -n kube-system describe pods -l k8s-app=kube-dns 2>&1 || true
            echo '```'
            echo '## kube-dns pods (logs)'
            echo '```'
            kubectl -n kube-system logs -l k8s-app=kube-dns --tail=100 --all-containers 2>&1 || true
            echo '```'
            echo '## recent events'
            echo '```'
            kubectl get events -A --sort-by='.lastTimestamp' 2>&1 | tail -80 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
